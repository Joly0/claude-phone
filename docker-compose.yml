version: '3.8'

# CRITICAL: All containers must use network_mode: host
# Docker bridge networking causes FreeSWITCH to advertise internal IPs
# in SDP, making RTP unreachable from external callers.

services:
  drachtio:
    image: drachtio/drachtio-server:latest
    container_name: drachtio
    restart: unless-stopped
    network_mode: host
    # --- TLS support (for SIP trunk providers that require TLS on port 5061) ---
    # Drachtio needs cert/key files to initialize TLS, even for outbound-only connections.
    # A self-signed cert is auto-generated at startup if none is provided.
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /etc/drachtio/tls
        if [ ! -f /etc/drachtio/tls/server.crt ]; then
          openssl req -x509 -newkey rsa:2048 \
            -keyout /etc/drachtio/tls/server.key \
            -out /etc/drachtio/tls/server.crt \
            -days 3650 -nodes -subj "/CN=drachtio" 2>/dev/null
          cp /etc/drachtio/tls/server.crt /etc/drachtio/tls/chain.pem
        fi
        exec drachtio \
          --contact "sip:*:${DRACHTIO_SIP_PORT:-5060};transport=tcp,udp" \
          --contact "sips:*:${DRACHTIO_TLS_PORT:-5061};transport=tls" \
          --cert-file /etc/drachtio/tls/server.crt \
          --key-file /etc/drachtio/tls/server.key \
          --chain-file /etc/drachtio/tls/chain.pem \
          --external-ip ${PUBLIC_IP:-${EXTERNAL_IP}} \
          --secret ${DRACHTIO_SECRET:-cymru} \
          --port 9022 \
          --loglevel info
    volumes:
      # Persist auto-generated TLS cert across restarts
      - drachtio-tls:/etc/drachtio/tls
    # Ports (for reference - host mode doesn't need port mapping):
    # - 5060 (DRACHTIO_SIP_PORT): SIP UDP/TCP
    # - 5061 (DRACHTIO_TLS_PORT): SIP TLS
    # - 9022: Admin/App Port

  freeswitch:
    image: drachtio/drachtio-freeswitch-mrf:latest
    container_name: freeswitch
    restart: unless-stopped
    network_mode: host
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Patch mrf.xml so only loopback counts as a local network. FreeSWITCH
        # then advertises ext-rtp-ip to ALL callers, which is required when a
        # SIP trunk delivers calls from outside the LAN.
        sed -i '/<param name="apply-nat-acl"/a \      <param name="local-network-acl" value="loopback.auto"/>' \
          /usr/local/freeswitch/conf/sip_profiles/mrf.xml
        exec /entrypoint.sh freeswitch \
          --sip-port 5080 \
          --rtp-range-start 30000 \
          --rtp-range-end 30100 \
          --ext-rtp-ip $${PUBLIC_IP:-$$EXTERNAL_IP} \
          --ext-sip-ip $$EXTERNAL_IP \
          --advertise-external-ip
    environment:
      # CRITICAL: Set this to your server's LAN IP
      # This IP goes into SDP packets so 3CX knows where to send audio
      - EXTERNAL_IP=${EXTERNAL_IP}
      - PUBLIC_IP=${PUBLIC_IP:-${EXTERNAL_IP}}
    # Ports (for reference):
    # - 8021: ESL (Event Socket Library)
    # - 5080: Internal SIP
    # - 30000-30100: RTP Audio (changed from 20000-20100 to avoid conflict with 3CX SBC)

  claude-api-server:
    build: ./claude-api-server
    container_name: claude-api-server
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      # Claude CLI auth and config (read-only)
      - ${HOME}/.claude:/home/node/.claude:ro
    # Ports (for reference):
    # - 3333: HTTP API

  voice-app:
    build: ./voice-app
    container_name: voice-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      # Audio files directory for TTS playback
      - ./voice-app/audio:/app/audio
      # Device configurations (includes openclaw.json)
      - ./voice-app/config:/app/config
    depends_on:
      - drachtio
      - freeswitch
    # Ports (for reference):
    # - 3000: HTTP API
    # - 3001: WebSocket for audio streaming

volumes:
  drachtio-tls:
